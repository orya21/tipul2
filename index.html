<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת רישום טיפול - Premium</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #8b5cf6; 
            --text: #f8fafc;
            --success: #10b981; 
            --danger: #ef4444; 
        }
        body { margin: 0; padding: 20px; height: 100vh; background-color: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text); }
        .slide-container { display: none; flex-direction: column; height: 90vh; background: var(--card); padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-grow: 1; margin-top: 20px; }
        .patient-grid { grid-template-columns: repeat(2, 1fr); overflow-y: auto; padding: 10px; }
        button { padding: 20px; border: none; border-radius: 20px; background: #334155; color: white; font-size: 24px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--accent); }
        .patient-btn { font-size: 32px; font-weight: bold; height: 120px; background: #475569; }
        .action-btn { height: 350px; font-size: 90px; font-weight: 800; cursor: pointer; }
        .btn-start { background: var(--success); }
        .btn-end { background: var(--danger); }
        h2 { font-size: 45px; text-align: center; margin-bottom: 30px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="slide-container active" id="s1">
        <h2>בחר מטפל/ת</h2>
        <div class="grid">
            <button onclick="setCaregiver('אלכס')">אלכס</button>
            <button onclick="setCaregiver('ג\'רי')">ג'רי</button>
            <button onclick="setCaregiver('ליאור')">ליאור</button>
            <button onclick="setCaregiver('עמונה')">עמונה</button>
            <button onclick="setCaregiver('אמאני')">אמאני</button>
            <button onclick="setCaregiver('האנדי')">האנדי</button>
        </div>
    </div>

    <div class="slide-container" id="s2">
        <h2 id="p-title">בחר מטופל/ת</h2>
        <div class="grid patient-grid" id="p-list"></div>
    </div>

    <div class="slide-container" id="s3">
        <button class="action-btn btn-start" onclick="goToEnd()">התחל טיפול</button>
    </div>

    <div class="slide-container" id="s4">
        <button class="action-btn btn-end" onclick="finish()">סיום טיפול</button>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbycfAX29PaNE3Ia3EGmhTJM3CjveArvasBmJ-Q8CogWQJ-egTyOuPDGqLDfyuEDQhBxKw/exec";
        const patients = ["רוני אלנתן", "שאול אטינגר", "נתנאל אנקרי", "דניאל שוורץ", "איבן ציקנוב", "אדווה יוזרלביץ", "אילן אזולאי", "ניר אבוטבול", "רועי מורלי", "תהילה זיגל", "דניאלה ליפשיץ", "הודיה מצליח", "עמית חסאן", "ניר בן סימון", "מיכאל גריבלט", "דוד גרונברגר", "שמעון לוי", "סופי נחאס", "גלי מאירי", "ליאור רובין", "מאיר לוי", "מיכל לוינה", "נועה צפתי", "אחמד אטרש", "ראובן פילו", "עדן עוזרי", "זוהר כהן", "אולגה סורוקין", "נחמיאס ליאת", "נופר מנצורי", "פסטמן רחל", "אלינור בלילתי", "ליר סגל", "דניאל מזרחי", "לידור לוי", "נתנאל דרמוני", "אחמד ג'עבר", "מרים שמלה", "שמעון אורי זעפרני"];
        let session = { c: "", p: "", start: null };

        function show(id) { document.querySelectorAll('.slide-container').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function setCaregiver(name) { session.c = name; const list = document.getElementById('p-list'); list.innerHTML = ""; patients.forEach(p => { const b = document.createElement('button'); b.className = 'patient-btn'; b.innerText = p; b.onclick = () => { session.p = p; show('s3'); }; list.appendChild(b); }); show('s2'); }
        function goToEnd() { session.start = new Date(); show('s4'); }
        function finish() { const form = document.createElement('form'); form.method = 'POST'; form.action = URL; const data = { caregiver: session.c, patient: session.p, startTime: session.start.toLocaleString(), endTime: new Date().toLocaleString() }; for(let k in data) { const i = document.createElement('input'); i.type = 'hidden'; i.name = k; i.value = data[k]; form.appendChild(i); } document.body.appendChild(form); form.submit(); }
    </script>
</body>
</html>
