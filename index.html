<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רישום טיפול - עיצוב נעים</title>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --accent: #6366f1; --soft-blue: #e0e7ff; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { margin: 0; padding: 20px; height: 100vh; background-color: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); overflow: hidden; }
        .slide-container { display: none; flex-direction: column; height: 90vh; background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-grow: 1; margin-top: 30px; }
        .patient-grid { grid-template-columns: repeat(2, 1fr); overflow-y: auto; }
        button { padding: 25px; border: none; border-radius: 20px; background: var(--soft-blue); color: var(--accent); font-size: 26px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--accent); color: white; }
        .patient-btn { font-size: 30px; height: 120px; background: #f1f5f9; }
        .action-btn { height: 250px; font-size: 70px; color: white; border: none; }
        .btn-start { background: var(--success); }
        .btn-end { background: var(--danger); }
        h2 { font-size: 45px; text-align: center; color: var(--accent); }
        #timer-display { font-size: 50px; text-align: center; margin: 40px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="slide-container active" id="s1">
        <h2>בחר מטפל/ת</h2>
        <div class="grid">
            <button onclick="setCaregiver('אלכס')">אלכס</button>
            <button onclick="setCaregiver('ג\'רי')">ג'רי</button>
            <button onclick="setCaregiver('ליאור')">ליאור</button>
            <button onclick="setCaregiver('עמונה')">עמונה</button>
            <button onclick="setCaregiver('אמאני')">אמאני</button>
            <button onclick="setCaregiver('האנדי')">האנדי</button>
        </div>
    </div>

    <div class="slide-container" id="s2">
        <h2 id="p-title">בחר מטופל/ת</h2>
        <div class="grid patient-grid" id="p-list"></div>
    </div>

    <div class="slide-container" id="s3">
        <button class="action-btn btn-start" onclick="startTimer()">התחל טיפול</button>
    </div>

    <div class="slide-container" id="s4">
        <h2>טיפול בעיצומו...</h2>
        <div id="timer-display">00:00</div>
        <button class="action-btn btn-end" onclick="finish()">סיום ושליחה</button>
    </div>
