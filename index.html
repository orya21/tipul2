<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת מעקב טיפולים</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; justify-content: center; }
        .tag { background: #007bff; color: white; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-size: 1.1rem; }
        input { padding: 15px; width: 70%; font-size: 1.2rem; border: 1px solid #ccc; border-radius: 10px; }
        button { padding: 15px 25px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 10px; background: #28a745; color: white; margin: 5px; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h1>ניהול הגדרות צוות</h1>
    
    <div class="input-group">
        <input type="text" id="in-caregiver" placeholder="שם מטפל/ת...">
        <button onclick="addTag('caregiver')">+</button>
    </div>
    <div id="caregiver-tags" class="tags-container"></div>

    <div class="input-group">
        <input type="text" id="in-patient" placeholder="שם מטופל/ת...">
        <button onclick="addTag('patient')">+</button>
    </div>
    <div id="patient-tags" class="tags-container"></div>
    
    <button onclick="saveSettings()" style="width: 100%; background: #007bff;">שמור והתחל לעבוד</button>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0WQGdoyvAJoCH9CW2dZW5fiwQfITGauyOOu6Kacwc3JPuKeGtOjXL45htMtXjTE90gg/exec";
    let caregivers = [];
    let patients = [];

    // טעינת נתונים ראשונית מהענן
    fetch(GOOGLE_SCRIPT_URL)
        .then(r => r.json())
        .then(data => {
            caregivers = data.caregivers || [];
            patients = data.patients || [];
            render();
        }).catch(e => console.log("טעינה ראשונית..."));

    function addTag(type) {
        let input = document.getElementById('in-' + type);
        if(input.value) {
            type === 'caregiver' ? caregivers.push(input.value) : patients.push(input.value);
            render();
            input.value = '';
        }
    }

    function render() {
        document.getElementById('caregiver-tags').innerHTML = caregivers.map((c, i) => `<span class="tag" onclick="remove('c', ${i})">${c} ✕</span>`).join('');
        document.getElementById('patient-tags').innerHTML = patients.map((p, i) => `<span class="tag" onclick="remove('p', ${i})">${p} ✕</span>`).join('');
    }

    function remove(type, i) {
        type === 'c' ? caregivers.splice(i, 1) : patients.splice(i, 1);
        render();
    }

    function saveSettings() {
        const payload = { type: 'settings', caregivers, patients };
        alert("שומר נתונים לענן...");

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            alert("נשמר בהצלחה!");
        });
    }
</script>
</body>
</html>
