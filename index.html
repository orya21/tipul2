<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת טיפול חכמה</title>
    <style>
        body { margin: 0; padding: 2vh; height: 96vh; background-color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        .slide { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1vw; flex-grow: 1; width: 100%; }
        .patient-grid { grid-template-columns: repeat(2, 1fr); overflow-y: auto; }
        button { border: none; border-radius: 2vh; font-size: 2.5vw; font-weight: bold; cursor: pointer; color: white; padding: 1.5vh; transition: 0.2s; }
        .action-btn { font-size: 5vw; height: 35vh; margin-top: 2vh; width: 100%; }
        #timer-display { font-size: 15vw; text-align: center; font-weight: 900; color: #334155; margin: 5vh 0; }
        h2 { font-size: 4vw; text-align: center; color: #475569; }
    </style>
</head>
<body>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <div class="slide active" id="s1">
        <h2>בחר מטפל/ת</h2>
        <div class="grid" id="caregiver-list"></div>
    </div>

    <div class="slide" id="s2">
        <h2 id="p-title">בחר מטופל/ת</h2>
        <div class="grid patient-grid" id="p-list"></div>
    </div>

    <div class="slide" id="s3">
        <button class="action-btn" style="background:#22c55e" onclick="startTimer()">התחל טיפול</button>
    </div>

    <div class="slide" id="s4">
        <div id="timer-display">0:00</div>
        <button class="action-btn" style="background:#ef4444" onclick="finish()">סיום ושליחה</button>
    </div>

    <div class="slide" id="s5">
        <div id="thank-you-msg" style="font-size: 6vw; color: #10b981; font-weight: bold;"></div>
    </div>

    <script>
        // הכנס כאן את ה-URL החדש מה-Deploy שביצעת בגוגל:
        const URL = "https://script.google.com/macros/s/AKfycbycfAX29PaNE3Ia3EGmhTJM3CjveArvasBmJ-Q8CogWQJ-egTyOuPDGqLDfyuEDQhBxKw/exec";
        
        const cList = [{name:"אלכס", color:"#3b82f6"}, {name:"ג'רי", color:"#8b5cf6"}, {name:"ליאור", color:"#ec4899"}, {name:"עמונה", color:"#f59e0b"}, {name:"אמאני", color:"#10b981"}, {name:"האנדי", color:"#64748b"}];
        
        // חלוקה למגדרים:
        const patients = [
            {name: "רוני אלנתן", g: "male"}, {name: "שאול אטינגר", g: "male"}, {name: "נתנאל אנקרי", g: "male"}, 
            {name: "אדווה יוזרלביץ", g: "female"}, {name: "תהילה זיגל", g: "female"}, {name: "דניאלה ליפשיץ", g: "female"}
            // הוסף את כל השאר באותו פורמט...
        ];
        
        let session = { c: "", p: "", start: null };

        cList.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c.name; b.style.backgroundColor = c.color;
            b.onclick = () => { session.c = c.name; renderPatients(); show('s2'); };
            document.getElementById('caregiver-list').appendChild(b);
        });

        function renderPatients() {
            const list = document.getElementById('p-list');
            list.innerHTML = "";
            patients.forEach(p => {
                const b = document.createElement('button');
                b.innerText = p.name; b.style.backgroundColor = "#94a3b8";
                b.onclick = () => { session.p = p.name; show('s3'); };
                list.appendChild(b);
            });
        }

        function show(id) { document.querySelectorAll('.slide').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function startTimer() { session.start = new Date(); show('s4'); 
            setInterval(() => { const d = new Date() - session.start; document.getElementById('timer-display').innerText = Math.floor(d/60000) + ":" + Math.floor((d%60000)/1000).toString().padStart(2,'0'); }, 1000);
        }

        function finish() {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = URL; form.target = "hidden_iframe";
            const data = { caregiver: session.c, patient: session.p, duration: document.getElementById('timer-display').innerText, time: new Date().toLocaleString() };
            for(let k in data) { const i = document.createElement('input'); i.type = 'hidden'; i.name = k; i.value = data[k]; form.appendChild(i); }
            document.body.appendChild(form); form.submit();
            document.getElementById('thank-you-msg').innerText = "תודה על השירות הטוב " + session.c + "!";
            show('s5');
            setTimeout(() => { location.reload(); }, 3000);
        }
    </script>
</body>
</html>
